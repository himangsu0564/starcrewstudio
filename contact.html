<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Starcrew Studios</title>

    <link rel="icon" type="image/jpeg" href="starcrew_logo.jpg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0c10;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-box {
            background: #11141a;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .contact-btn {
            display: block;
            text-decoration: none;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }

        .instagram {
            background: #E1306C;
        }

        .discord {
            background: #5865F2;
        }

        .email {
            background: #ffffff;
            color: black;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="contact-box">

        <img src="starcrew_logo.jpg" alt="Starcrew Studios Logo" class="logo">

        <h1>Contact Starcrew Studios</h1>

        <p>
            Reach out to Starcrew Studios on Instagram, Discord, Email.
        </p>

        <a href="https://instagram.com/" target="_blank" class="contact-btn instagram">
            Instagram
        </a>

        <a href="https://discord.gg/4b2VUwZhr2" target="_blank" class="contact-btn discord">
            Discord
        </a>

        <a href="mailto:your@email.com" class="contact-btn email">
            Email
        </a>

        <a href="index.html" class="back-btn">
            ← Back to Home
        </a>

    </div>

</body>
</html>
